<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día del Padre — Gabriel Acosta</title>
    <meta name="description" content="Un homenaje especial para el profesor Gabriel Acosta en el Día del Padre.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        /* ============ RESET & BASE ============ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold-light: #f5e6c8;
            --gold: #d4a855;
            --gold-deep: #b8860b;
            --navy: #0a1628;
            --navy-mid: #111d35;
            --navy-light: #1a2a4a;
            --text-light: rgba(255, 255, 255, 0.88);
            --text-muted: rgba(255, 255, 255, 0.55);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--navy);
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
        }

        /* ============ PARTICLE CANVAS ============ */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ============ HERO SECTION ============ */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            z-index: 1;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 50% 50%, rgba(212, 168, 85, 0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 20% 80%, rgba(184, 134, 11, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(245, 230, 200, 0.04) 0%, transparent 50%);
            animation: slowRotate 60s linear infinite;
            z-index: -1;
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ============ CROWN ICON ============ */
        .crown-container {
            margin-bottom: 1rem;
            animation: fadeInDown 1.2s ease-out;
        }

        .crown-svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 0 20px rgba(212, 168, 85, 0.4));
            animation: gentleFloat 4s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ============ DECORATIVE LINE ============ */
        .decorative-line {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            animation: fadeIn 1.5s ease-out 0.3s both;
        }

        .decorative-line .line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .decorative-line .diamond {
            width: 8px;
            height: 8px;
            background: var(--gold);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        /* ============ SUBTITLE BADGE ============ */
        .subtitle-badge {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.75rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            padding: 0.6rem 2rem;
            border: 1px solid rgba(212, 168, 85, 0.3);
            border-radius: 100px;
            background: rgba(212, 168, 85, 0.06);
            backdrop-filter: blur(10px);
            margin-bottom: 1.2rem;
            animation: fadeIn 1.2s ease-out 0.2s both;
        }

        /* ============ MAIN TITLE ============ */
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2.5rem, 7vw, 5.5rem);
            line-height: 1.1;
            margin-bottom: 0.5rem;
            animation: fadeInUp 1.2s ease-out 0.5s both;
        }

        .hero-title .line-1 {
            display: block;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-title .line-2 {
            display: block;
            font-family: 'Great Vibes', cursive;
            font-weight: 400;
            font-size: clamp(2rem, 5.5vw, 4.5rem);
            color: white;
            -webkit-text-fill-color: white;
            margin-top: 0.3rem;
        }

        /* ============ NAME ============ */
        .father-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 4vw, 3rem);
            font-weight: 700;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff 0%, var(--gold-light) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 0.5rem;
            margin-bottom: 2rem;
            animation: fadeInUp 1.2s ease-out 0.7s both;
        }

        /* ============ DEDICATION ============ */
        .dedication {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            animation: fadeIn 1.5s ease-out 1.2s both;
        }

        .dedication p {
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            max-width: 480px;
            line-height: 1.6;
        }

        .dedication p .highlight {
            color: var(--gold);
            font-weight: 500;
        }

        .dedication .heart {
            font-size: 1.2rem;
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        /* ============ ANIMATIONS ============ */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============ RESPONSIVENESS ============ */
        @media (max-width: 600px) {
            .dedication p {
                font-size: 0.8rem;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- Particle Background -->
    <canvas id="particles-canvas"></canvas>

    <!-- ====== HERO SECTION ====== -->
    <section class="hero" id="hero">
        <div class="crown-container">
            <svg class="crown-svg" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 60L20 25L35 45L50 10L65 45L80 25L90 60" 
                      stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="8" y="58" width="84" height="10" rx="3" fill="url(#goldGrad)" opacity="0.8"/>
                <circle cx="20" cy="24" r="4" fill="#d4a855"/>
                <circle cx="50" cy="8" r="5" fill="#f5e6c8"/>
                <circle cx="80" cy="24" r="4" fill="#d4a855"/>
                <defs>
                    <linearGradient id="goldGrad" x1="0" y1="0" x2="100" y2="80">
                        <stop offset="0%" stop-color="#f5e6c8"/>
                        <stop offset="50%" stop-color="#d4a855"/>
                        <stop offset="100%" stop-color="#b8860b"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <div class="subtitle-badge">Día del Padre 2026</div>

        <h1 class="hero-title">
            <span class="line-1">Feliz Día del Padre</span>
            <span class="line-2">para un profesor extraordinario</span>
        </h1>

        <div class="decorative-line">
            <div class="line"></div>
            <div class="diamond"></div>
            <div class="line"></div>
        </div>

        <p class="father-name">Gabriel Acosta</p>

        <div class="dedication">
            <p>Gracias por su <span class="highlight">compromiso</span> y <span class="highlight">dedicación</span> — por inspirarnos a ser mejores cada día.</p>
            <span class="heart">❤️</span>
        </div>
    </section>

    <!-- ====== SCRIPTS ====== -->
    <script>
        // ===== PARTICLE SYSTEM =====
        (function () {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let w, h;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedY = -(Math.random() * 0.3 + 0.1);
                    this.speedX = (Math.random() - 0.5) * 0.2;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    this.fadeSpeed = Math.random() * 0.005 + 0.002;
                    this.growing = Math.random() > 0.5;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    if (this.growing) {
                        this.opacity += this.fadeSpeed;
                        if (this.opacity >= 0.6) this.growing = false;
                    } else {
                        this.opacity -= this.fadeSpeed;
                        if (this.opacity <= 0.05) this.reset();
                    }
                    if (this.y < -10) this.reset();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212, 168, 85, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>
</body>
</html>
